<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAYROLL — 승인 처리</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .approve-card { border-left: 4px solid var(--warning); }
    .approve-card.done { border-left-color: var(--border); opacity: .7; }
    .overtime-detail { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .overtime-detail strong { color: var(--dark); }
    .approval-actions { display: flex; gap: 8px; margin-top: 14px; }
    .comment-input { display: none; margin-top: 10px; }
    .comment-input.open { display: block; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>PAYROLL</h1><p>급여 지급 관리 시스템</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section">메뉴</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">🏠</span>대시보드</a>
      <div id="overtimeMenuItem"></div>
      <a href="approval.html"  class="nav-item active"><span class="icon">✅</span>승인 처리</a>
      <div id="hrMenuItems"></div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info"><p id="userName">—</p><span id="userSub">—</span></div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">🚪 로그아웃</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>✅ 승인 처리</h2>
      <p>내 차례의 야근 신청서를 확인하고 승인 또는 반려합니다.</p>
    </div>

    <div id="pendingContainer">
      <p style="color:var(--muted)">불러오는 중...</p>
    </div>

    <!-- 모두 처리된 경우 -->
    <div id="allDoneMsg" style="display:none;" class="card" style="text-align:center;">
      <div style="text-align:center;padding:40px;color:var(--muted);">
        <div style="font-size:48px;margin-bottom:12px;">🎉</div>
        <p style="font-size:15px;font-weight:600;">처리할 승인 건이 없습니다!</p>
        <p style="font-size:13px;">모든 신청서를 처리했습니다.</p>
      </div>
    </div>
  </main>
</div>

<!-- 코멘트 모달 -->
<div class="modal-overlay" id="actionModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">승인 확인</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p id="modalDesc" style="font-size:13.5px;color:var(--muted);margin-bottom:14px;"></p>
      <div class="form-group">
        <label class="form-label">코멘트 (선택)</label>
        <textarea class="form-control" id="actionComment" rows="3" placeholder="승인/반려 사유를 입력하세요..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn" id="modalConfirmBtn" onclick="confirmAction()">확인</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  const user = Auth.require();
  let pendingAction = null; // { type, overtimeId }

  if (user) {
    renderUserChip(user);
    const isHR = user.role === 'HR' || user.role === 'ADMIN';
    if (user.role === 'EMPLOYEE') {
      document.getElementById('overtimeMenuItem').innerHTML =
        `<a href="overtime.html" class="nav-item"><span class="icon">🌙</span>야근 신청</a>`;
    }
    if (isHR) {
      document.getElementById('hrMenuItems').innerHTML = `
        <a href="salary.html" class="nav-item"><span class="icon">💰</span>급여 지급</a>
        <a href="rank-management.html" class="nav-item"><span class="icon">⚙️</span>직책 관리</a>`;
    }
    loadPending();
  }

  async function loadPending() {
    const container = document.getElementById('pendingContainer');
    try {
      const list = await API.getPendingApprovals(user.id);
      if (list.length === 0) {
        container.style.display = 'none';
        document.getElementById('allDoneMsg').style.display = 'block';
        return;
      }
      container.innerHTML = `
        <div style="margin-bottom:12px;font-size:13.5px;font-weight:600;color:var(--muted)">
          ${list.length}건의 승인 대기 중
        </div>
        ${list.map(o => renderOvertimeCard(o)).join('')}`;
    } catch (e) {
      container.innerHTML = `<div class="alert alert-error show">${e.message}</div>`;
    }
  }

  function renderOvertimeCard(o) {
    const approvedPay = (o.hours * 10000 * 1.5).toLocaleString('ko-KR');
    return `
    <div class="card" style="margin-bottom:16px;border-left:4px solid var(--warning);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:15px;font-weight:700;">${o.requesterName} 
            <span style="font-size:12px;color:var(--muted);font-weight:400;">${o.requesterRankTitle}</span>
          </div>
          <div class="overtime-detail" style="margin-top:8px;">
            📅 <strong>${o.overtimeDate}</strong> &nbsp;
            ⏱ <strong>${o.hours}시간</strong> &nbsp;
            💵 수당 약 <strong>${approvedPay}원</strong>
          </div>
          <div class="overtime-detail" style="margin-top:6px;">
            💬 ${o.reason || '사유 없음'}
          </div>
          <div style="margin-top:10px;">${renderStepChain(o.approvalSteps)}</div>
        </div>
        <div>${statusBadge(o.status)}</div>
      </div>
      <div class="approval-actions">
        <button class="btn btn-success btn-sm" onclick="openAction('approve', ${o.id}, '${o.requesterName}')">
          ✅ 승인
        </button>
        <button class="btn btn-danger btn-sm" onclick="openAction('reject', ${o.id}, '${o.requesterName}')">
          ❌ 반려
        </button>
      </div>
    </div>`;
  }

  function openAction(type, overtimeId, name) {
    pendingAction = { type, overtimeId };
    const isApprove = type === 'approve';
    document.getElementById('modalTitle').textContent  = isApprove ? '✅ 승인 확인' : '❌ 반려 확인';
    document.getElementById('modalDesc').textContent   = `${name}의 야근 신청을 ${isApprove ? '승인' : '반려'}합니다.`;
    document.getElementById('actionComment').value     = '';
    const btn = document.getElementById('modalConfirmBtn');
    btn.className = `btn ${isApprove ? 'btn-success' : 'btn-danger'}`;
    btn.textContent = isApprove ? '승인' : '반려';
    document.getElementById('actionModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('actionModal').classList.remove('open');
    pendingAction = null;
  }

  async function confirmAction() {
    if (!pendingAction) return;
    const { type, overtimeId } = pendingAction;
    const comment = document.getElementById('actionComment').value.trim();
    const btn = document.getElementById('modalConfirmBtn');
    btn.disabled = true;

    try {
      if (type === 'approve') {
        await API.approveOvertime(overtimeId, user.id, comment);
        showToast('승인 처리되었습니다 ✅', 'success');
      } else {
        await API.rejectOvertime(overtimeId, user.id, comment);
        showToast('반려 처리되었습니다', 'error');
      }
      closeModal();
      await loadPending();
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
