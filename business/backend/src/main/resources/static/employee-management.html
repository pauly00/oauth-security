<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAYROLL — 사용자 관리</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>PAYROLL</h1><p>급여 지급 관리 시스템</p></div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- 동적 로드 -->
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info"><p id="userName">—</p><span id="userSub">—</span></div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">🚪 로그아웃</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>👥 사용자 관리</h2>
      <p>회사 소속 사원을 조회, 추가, 삭제할 수 있습니다.</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">
      <!-- 사원 목록 -->
      <div class="card">
        <div class="card-title"><span class="icon">📋</span> 사원 목록</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>이름</th><th>이메일</th><th>직책</th><th>역할</th><th>액션</th></tr>
            </thead>
            <tbody id="employeeBody">
              <tr class="empty-row"><td colspan="5">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 사원 추가 -->
      <div class="card">
        <div class="card-title"><span class="icon">➕</span> 사원 추가</div>
        <div id="addAlert" class="alert"></div>
        <form onsubmit="addEmployee(event)">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input class="form-control" id="empName" type="text" placeholder="홍길동" required>
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="form-control" id="empEmail" type="email" placeholder="hong@fisa.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input class="form-control" id="empPassword" type="password" placeholder="비밀번호" required>
          </div>
          <div class="form-group">
            <label class="form-label">역할</label>
            <select class="form-control" id="empRole" required>
              <option value="EMPLOYEE">일반 사원</option>
              <option value="HR">HR 매니저</option>
              <option value="ADMIN">관리자</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">직책</label>
            <select class="form-control" id="empRankLevel" required>
              <option value="">-- 직책 선택 --</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" id="addBtn">사원 추가</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  const user = Auth.requireHR();
  let rankLevels = [];

  if (user) {
    renderUserChip(user);
    buildNav(user);
    loadRankLevels();
    loadEmployees();
  }

  function buildNav(u) {
    const isHR = u.role === 'HR' || u.role === 'ADMIN';
    const items = [
      { href: 'dashboard.html',       icon: '🏠', label: '대시보드' },
      ...(u.role === 'EMPLOYEE'
        ? [{ href: 'overtime.html', icon: '🌙', label: '야근 신청' }]
        : []),
      ...(!isHR ? [{ href: 'approval.html', icon: '✅', label: '승인 처리' }] : []),
      ...(isHR ? [
        { href: 'salary.html',        icon: '💰', label: '급여 지급' },
        { href: 'employee-management.html', icon: '👥', label: '사용자 관리', active: true },
        { href: 'rank-management.html', icon: '⚙️', label: '직책 관리' },
      ] : []),
    ];
    const nav = document.getElementById('sidebarNav');
    nav.innerHTML = `<div class="nav-section">메뉴</div>` +
      items.map(i => `<a href="${i.href}" class="nav-item ${i.active?'active':''}">
        <span class="icon">${i.icon}</span>${i.label}</a>`).join('');
  }

  async function loadRankLevels() {
    try {
      rankLevels = await API.getRankLevels(user.companyId);
      const select = document.getElementById('empRankLevel');
      select.innerHTML = '<option value="">-- 직책 선택 --</option>' +
        rankLevels.map(rl => `<option value="${rl.id}">${rl.title} (Lv.${rl.level})</option>`).join('');
    } catch (e) {
      console.error('직책 로딩 실패:', e);
    }
  }

  async function loadEmployees() {
    const tbody = document.getElementById('employeeBody');
    try {
      const list = await API.getEmployeesByCompany(user.companyId);
      if (list.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">등록된 사원이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(emp => `
        <tr>
          <td><strong>${emp.name}</strong></td>
          <td style="font-size:12px;color:var(--muted);">${emp.email}</td>
          <td>${emp.rankTitle || '—'}</td>
          <td>${roleBadge(emp.role)}</td>
          <td>
            ${emp.id === user.id
              ? '<span style="font-size:12px;color:var(--muted);">본인</span>'
              : `<button class="btn btn-outline btn-sm" onclick="deleteEmployee(${emp.id}, '${emp.name}')"
                  style="color:var(--danger);border-color:var(--danger);">삭제</button>`}
          </td>
        </tr>`).join('');
    } catch (e) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5">오류: ${e.message}</td></tr>`;
    }
  }

  function roleBadge(role) {
    const map = {
      EMPLOYEE: '<span class="status-badge" style="background:#dbeafe;color:#1d4ed8;">사원</span>',
      HR:       '<span class="status-badge" style="background:#fce7f3;color:#be185d;">HR</span>',
      ADMIN:    '<span class="status-badge" style="background:#fef3c7;color:#92400e;">관리자</span>',
    };
    return map[role] || role;
  }

  async function addEmployee(e) {
    e.preventDefault();
    const alertEl = document.getElementById('addAlert');
    alertEl.classList.remove('show');
    const btn = document.getElementById('addBtn');
    btn.disabled = true;

    try {
      await API.createEmployee({
        name: document.getElementById('empName').value.trim(),
        email: document.getElementById('empEmail').value.trim(),
        password: document.getElementById('empPassword').value,
        role: document.getElementById('empRole').value,
        companyId: user.companyId,
        rankLevelId: parseInt(document.getElementById('empRankLevel').value),
      });
      alertEl.className = 'alert alert-success show';
      alertEl.textContent = '✅ 사원이 추가되었습니다.';
      document.getElementById('empName').value = '';
      document.getElementById('empEmail').value = '';
      document.getElementById('empPassword').value = '';
      await loadEmployees();
    } catch (err) {
      alertEl.className = 'alert alert-error show';
      alertEl.textContent = err.message;
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteEmployee(id, name) {
    if (!confirm(`"${name}" 사원을 삭제하시겠습니까?\n관련 야근 신청/승인 데이터도 영향받을 수 있습니다.`)) return;
    try {
      await API.deleteEmployee(id);
      showToast(`"${name}" 삭제 완료`, 'success');
      await loadEmployees();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }
</script>
</body>
</html>
