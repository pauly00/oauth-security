spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payroll_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: false
  sql:
    init:
      mode: always
      platform: mysql
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.payroll: DEBUG
