<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAYROLL — 로그인</title>
  <meta name="description" content="급여 지급 관리 시스템 로그인">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; overflow: hidden; }
    .particles {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: rgba(99,102,241,.4);
      animation: float linear infinite;
    }
    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="login-page">
  <!-- 왼쪽 브랜드 영역 -->
  <div class="login-left">
    <div class="particles" id="particles"></div>
    <div class="login-brand">
      <h1>PAYROLL<br>SERVICE</h1>
      <p>체계적인 야근 승인 워크플로우와<br>투명한 급여 지급 시스템</p>
      <div class="login-features">
        <div class="login-feature">
          <div class="feat-icon">🏢</div>
          <div>
            <strong>커스터마이징 가능한 직책</strong><br>
            <span style="font-size:12px;color:rgba(255,255,255,.5)">HR이 직접 직책 레벨을 설정</span>
          </div>
        </div>
        <div class="login-feature">
          <div class="feat-icon">✅</div>
          <div>
            <strong>단계별 승인 워크플로우</strong><br>
            <span style="font-size:12px;color:rgba(255,255,255,.5)">계층 구조에 따른 자동 승인 체인</span>
          </div>
        </div>
        <div class="login-feature">
          <div class="feat-icon">💰</div>
          <div>
            <strong>야근 수당 자동 계산</strong><br>
            <span style="font-size:12px;color:rgba(255,255,255,.5)">승인 시 수당 자동 반영</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 로그인 폼 -->
  <div class="login-right">
    <div class="login-form-box">
      <h2>로그인</h2>
      <p>이메일과 비밀번호를 입력하세요</p>

      <!-- 빠른 로그인 (데모용) -->
      <div class="quick-login">
        <p>🎯 빠른 로그인 (시연용)</p>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickLogin('kim@fisa.com','1234')">👤 계장 김철수</button>
          <button class="quick-btn" onclick="quickLogin('lee@fisa.com','1234')">👤 대리 이영희</button>
          <button class="quick-btn" onclick="quickLogin('choi@fisa.com','1234')">👤 과장 최민수</button>
          <button class="quick-btn" onclick="quickLogin('han@fisa.com','1234')">👤 차장 한지원</button>
          <button class="quick-btn" onclick="quickLogin('park@fisa.com','1234')">👤 부장 박민준</button>
          <button class="quick-btn" onclick="quickLogin('hr@fisa.com','1234')" style="border-color:#6366f1;color:#6366f1;">🛡️ HR 정수진</button>
        </div>
      </div>

      <div class="divider"></div>

      <div id="loginError" class="alert alert-error"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input class="form-control" id="email" type="email" placeholder="example@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-control" id="password" type="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">로그인</button>
      </form>

      <p style="margin-top:20px;font-size:12px;color:#94a3b8;text-align:center;">
        시연용 비밀번호는 모두 <strong>1234</strong>입니다
      </p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // 이미 로그인 → 대시보드로
  if (Auth.get()) window.location.href = 'dashboard.html';

  // Particle animation
  const container = document.getElementById('particles');
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 15 + 8) + 's';
    p.style.animationDelay   = (Math.random() * 10) + 's';
    container.appendChild(p);
  }

  function quickLogin(email, pw) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pw;
    document.getElementById('loginForm').requestSubmit();
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = '로그인 중...';

    try {
      const user = await API.login(email, password);
      Auth.save(user);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  }
</script>
</body>
</html>
